{
  "version": "1.0",
  "global_checks": [
    {
      "id": "management-yaml-parses",
      "description": "All docs/management/*.yaml files parse as JSON-compatible YAML."
    },
    {
      "id": "management-schema-match",
      "description": "Each management YAML file satisfies its matching JSON Schema."
    },
    {
      "id": "agents-points-to-management",
      "description": "AGENTS.md points to docs/management files instead of duplicating detailed operational prose."
    },
    {
      "id": "legacy-branding-removed",
      "description": "Starter-facing docs, examples, and metadata do not carry legacy organization-specific names, identifiers, or deployment paths."
    },
    {
      "id": "subagent-small-disabled",
      "description": "agent-policy.yaml keeps small.allowed set to false."
    },
    {
      "id": "automation-stop-rule-documented",
      "description": "AGENTS.md and agent-policy.yaml explicitly require scheduled or recurring automation to no-op and exit immediately when the project exit criteria are already satisfied."
    }
  ],
  "phase_checks": [
    {
      "phase_id": "discover",
      "checks": [
        {
          "id": "discovery-evidence",
          "description": "Repository shape, entry points, and relevant docs are inspected before tracked changes."
        }
      ]
    },
    {
      "phase_id": "plan",
      "checks": [
        {
          "id": "plan-has-next-actions",
          "description": "plan.yaml records current phase, active items, next actions, blockers, and risks."
        }
      ]
    },
    {
      "phase_id": "implement",
      "checks": [
        {
          "id": "schemas-updated-with-instances",
          "description": "Any change to a management YAML file is reflected in its schema."
        },
        {
          "id": "prose-doc-boundaries",
          "description": "Operational rules stay in management files instead of reappearing in prose docs."
        }
      ]
    },
    {
      "phase_id": "verify",
      "checks": [
        {
          "id": "schema-script",
          "description": "./tests/validate_management_docs.py exits successfully when run directly or through an explicit Python 3 interpreter."
        },
        {
          "id": "doc-links",
          "description": "README.md and AGENTS.md link to the new management source of truth."
        }
      ]
    },
    {
      "phase_id": "handoff",
      "checks": [
        {
          "id": "handoff-freshness",
          "description": "handoff.yaml reflects current done work, open risks, and next recommended actions."
        }
      ]
    }
  ],
  "completion_checks": [
    {
      "id": "readme-cmake-alignment",
      "description": "README.md build and validation commands match the repository files and CMake targets."
    },
    {
      "id": "management-doc-source-of-truth",
      "description": "docs/roadmap.md, docs/handoff.md, and docs/decisions.md act as thin indexes instead of duplicate operational sources."
    },
    {
      "id": "direction-pause-reflected",
      "description": "plan.yaml and handoff.yaml reflect the accepted standalone D:/git/CLI delivery boundary, scope git work to D:/git/CLI, and keep the parent D:/git repository out of CLI starter history operations."
    },
    {
      "id": "remaining-gaps-documented",
      "description": "Any missing toolchain or runtime validation is recorded in plan.yaml and handoff.yaml."
    },
    {
      "id": "project-exit-criteria-aligned",
      "description": "plan.yaml goal.success_criteria and agent-policy.yaml completion_policy describe the same project completion gate."
    }
  ]
}
