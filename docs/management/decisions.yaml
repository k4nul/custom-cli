{
  "version": "1.0",
  "decisions": [
    {
      "id": "D1",
      "title": "Replace the legacy runtime plugin model with static registration",
      "status": "accepted",
      "date": "2026-04-16",
      "context": [
        "The legacy plugin loader depended on unavailable external infrastructure.",
        "Starter users need a copy-friendly baseline that does not rely on runtime shared-library discovery."
      ],
      "decision": [
        "Compile commands into the binary by default.",
        "Treat any future plugin support as an optional extension rather than a baseline requirement."
      ],
      "rationale": [
        "Static registration is easier to understand, easier to build, and easier to customize in a starter."
      ],
      "impact": [
        "New commands are added through central registration.",
        "Runtime plugin discovery is no longer part of the starter contract."
      ],
      "alternatives_considered": [
        {
          "option": "Keep runtime plugin loading in the starter baseline",
          "reason_not_selected": "It would keep hidden infrastructure assumptions and complicate adoption."
        }
      ]
    },
    {
      "id": "D2",
      "title": "Use CLI11 for command-line parsing",
      "status": "accepted",
      "date": "2026-04-16",
      "context": [
        "The unavailable legacy utility layer previously handled command flow indirectly.",
        "The starter needs an accessible parser with subcommands and help generation."
      ],
      "decision": [
        "Vendor CLI11 as the command-line parsing library."
      ],
      "rationale": [
        "CLI11 is header-only, lightweight, and suited to subcommand-heavy CLI tools."
      ],
      "impact": [
        "Command registration is explicit and centralized."
      ],
      "alternatives_considered": [
        {
          "option": "Build a parser entirely in-house",
          "reason_not_selected": "It would add maintenance cost without improving the starter experience."
        }
      ]
    },
    {
      "id": "D3",
      "title": "Use nlohmann/json for configuration",
      "status": "superseded",
      "date": "2026-04-16",
      "context": [
        "The legacy code depended on formatter-based JSON helpers that are no longer available.",
        "The starter needs a common and accessible JSON configuration layer."
      ],
      "decision": [
        "Vendor nlohmann/json for reading and writing configuration."
      ],
      "rationale": [
        "The library is header-only, common in C++ projects, and straightforward for template users."
      ],
      "impact": [
        "Configuration behavior is explicit in starter/core/config.cpp."
      ],
      "alternatives_considered": [
        {
          "option": "Custom JSON reader and writer",
          "reason_not_selected": "It would recreate solved problems and increase maintenance scope."
        }
      ]
    },
    {
      "id": "D4",
      "title": "Use doctest for starter tests",
      "status": "accepted",
      "date": "2026-04-16",
      "context": [
        "The repository needs a minimal C++ test framework for starter-level checks."
      ],
      "decision": [
        "Vendor doctest as the default C++ unit-test framework."
      ],
      "rationale": [
        "It is single-header, lightweight, and suitable for a starter template."
      ],
      "impact": [
        "Starter tests remain simple to build and extend."
      ],
      "alternatives_considered": [
        {
          "option": "Adopt a heavier unit-test framework",
          "reason_not_selected": "It would raise entry cost for downstream users without clear starter-level benefit."
        }
      ]
    },
    {
      "id": "D5",
      "title": "Keep logging and retained utility behavior local",
      "status": "accepted",
      "date": "2026-04-16",
      "context": [
        "The legacy utility layer covered a wide surface area that is unnecessary for the starter baseline."
      ],
      "decision": [
        "Use the C++ standard library and focused local helpers for retained utility behavior."
      ],
      "rationale": [
        "A smaller dependency surface is easier to understand and maintain in a reusable starter."
      ],
      "impact": [
        "The repository only vendors libraries for CLI parsing, JSON, and tests."
      ],
      "alternatives_considered": [
        {
          "option": "Replace the old utility layer with another large support framework",
          "reason_not_selected": "It would reintroduce hidden complexity into the starter."
        }
      ]
    },
    {
      "id": "D6",
      "title": "Use docs/management as the source of truth for operational state",
      "status": "accepted",
      "date": "2026-04-16",
      "context": [
        "Operational rules, roadmap state, handoff notes, and decisions were previously tracked as prose in multiple docs."
      ],
      "decision": [
        "Store phases, current plan, agent policy, verification rules, decisions, and handoff data under docs/management/."
      ],
      "rationale": [
        "Structured management files are easier to validate, update consistently, and hand off between operators."
      ],
      "impact": [
        "docs/roadmap.md, docs/handoff.md, and docs/decisions.md become thin indexes.",
        "AGENTS.md points to management files instead of duplicating detailed rules."
      ],
      "alternatives_considered": [
        {
          "option": "Keep operational state in prose-only markdown",
          "reason_not_selected": "It makes drift and duplication harder to detect automatically."
        }
      ]
    },
    {
      "id": "D7",
      "title": "Store management instances as JSON-compatible YAML",
      "status": "accepted",
      "date": "2026-04-16",
      "context": [
        "The repository needs YAML management files and schema validation, but the current workspace should not rely on external parsing packages."
      ],
      "decision": [
        "Write docs/management/*.yaml in a JSON-compatible YAML subset.",
        "Validate them with stock Python and matching JSON Schema definitions."
      ],
      "rationale": [
        "JSON is valid YAML 1.2 and can be parsed with the Python standard library."
      ],
      "impact": [
        "Management files keep the .yaml extension while remaining easy to validate without extra packages."
      ],
      "alternatives_considered": [
        {
          "option": "Require PyYAML or another external parser",
          "reason_not_selected": "It would add a non-essential environment dependency for repository validation."
        }
      ]
    },
    {
      "id": "D8",
      "title": "Use a three-tier sub-agent policy",
      "status": "accepted",
      "date": "2026-04-16",
      "context": [
        "Delegation rules need to be explicit enough to prevent unnecessary sub-agent use on small tasks."
      ],
      "decision": [
        "Classify delegation opportunities as small, medium, or large.",
        "Forbid sub-agent use on small work and require ownership boundaries on delegated implementation."
      ],
      "rationale": [
        "A three-tier model is specific enough to guide behavior without overfitting the policy."
      ],
      "impact": [
        "Small work is always handled locally.",
        "Medium and large work use delegation only when scope and ownership are explicit."
      ],
      "alternatives_considered": [
        {
          "option": "Use an unstructured delegate-or-not rule",
          "reason_not_selected": "It would leave too much judgment unrecorded for future operators."
        }
      ]
    },
    {
      "id": "D9",
      "title": "Use GitHub Actions for starter CI verification",
      "status": "superseded",
      "date": "2026-04-16",
      "context": [
        "The current local workspace does not provide CMake or a C++ compiler for end-to-end starter verification.",
        "The repository already has a stock-Python management-doc validator and CTest hooks for both C++ tests and schema validation."
      ],
      "decision": [
        "Add a GitHub Actions workflow that runs on push and pull request events.",
        "Run management-doc validation in a dedicated Python job.",
        "Run CMake configure, build, and ctest on ubuntu-latest and windows-latest runners."
      ],
      "rationale": [
        "Hosted runners provide the missing toolchains without adding local environment assumptions.",
        "Using the same commands in CI and repository docs keeps verification guidance concrete and repeatable."
      ],
      "impact": [
        "The repository gains an automated path for schema validation and cross-platform build checks.",
        "The first confirmed toolchain results can be recorded from CI even before a local compiler is available."
      ],
      "alternatives_considered": [
        {
          "option": "Rely only on manual local verification",
          "reason_not_selected": "The current workspace cannot complete that verification and future operators would still lack a shared automated baseline."
        },
        {
          "option": "Automate only the management-doc validation script",
          "reason_not_selected": "It would leave the starter build and test flow unverified on the target platforms."
        }
      ]
    },
    {
      "id": "D10",
      "title": "Integrate the CLI starter workflow into the active parent repository root",
      "status": "superseded",
      "date": "2026-04-16",
      "context": [
        "The active Git repository root in the current workspace is D:/git, not D:/git/CLI.",
        "GitHub Actions only discovers workflow files from the repository root, so D:/git/CLI/.github/workflows/ci.yml cannot trigger while CLI remains a subdirectory."
      ],
      "decision": [
        "Treat D:/git as the active repository boundary for automation in this workspace.",
        "Store the runnable CLI workflow at D:/git/.github/workflows/cli-starter-ci.yml and run build and validation steps from the CLI/ subdirectory."
      ],
      "rationale": [
        "Placing the workflow at the active repository root resolves the trigger gap without requiring immediate repository surgery or local toolchain changes.",
        "Running only on CLI/** and the workflow file avoids unrelated parent-repository changes from triggering the starter checks."
      ],
      "impact": [
        "The CLI starter now has a GitHub Actions workflow path that can trigger from the current repository layout.",
        "Future operators should observe and record the first hosted CI run instead of revisiting the repository-boundary decision first."
      ],
      "alternatives_considered": [
        {
          "option": "Initialize D:/git/CLI as its own Git repository immediately",
          "reason_not_selected": "That would change repository ownership and history shape beyond the scope of the current single next action."
        },
        {
          "option": "Keep the workflow only under D:/git/CLI/.github/workflows/",
          "reason_not_selected": "GitHub Actions would still ignore it because the file would remain outside the active repository root."
        }
      ]
    },
    {
      "id": "D11",
      "title": "Require a follow-up direction decision before git usage resumes",
      "status": "accepted",
      "date": "2026-04-17",
      "context": [
        "The repository still contained legacy organization-specific references in migration documentation.",
        "Recent operational next steps had drifted toward repository-history and remote workflow follow-up before the next project direction was explicitly re-confirmed."
      ],
      "decision": [
        "Remove any remaining legacy organization-specific names, identifiers, paths, and references from the repository as they are found.",
        "Do not use git for this project until a follow-up direction decision is explicitly accepted in docs/management/decisions.yaml.",
        "Keep near-term work limited to local edits, local validation, and direction-setting documentation while the pause is active."
      ],
      "rationale": [
        "The starter should stay neutral and reusable without carrying forward legacy organization-specific traces.",
        "Pausing git operations prevents more churn around repository history, remotes, and CI before the project's next direction is intentionally chosen."
      ],
      "impact": [
        "plan.yaml and handoff.yaml should stop recommending pushes, commits, or other git-driven next steps until the pause is lifted by a follow-up decision.",
        "Future operators must record the next repository direction before resuming git-based workflows."
      ],
      "alternatives_considered": [
        {
          "option": "Continue the existing git-based CI follow-up while the next project direction remains undecided",
          "reason_not_selected": "It would spend effort on repository mechanics before the project's near-term direction is settled."
        }
      ]
    },
    {
      "id": "D12",
      "title": "Keep the CLI starter local-first inside the active parent repository boundary",
      "status": "superseded",
      "date": "2026-04-17",
      "context": [
        "The active repository boundary in the current workspace is D:/git, and the CLI starter lives at D:/git/CLI.",
        "The GitHub Actions workflow from the earlier CI decision already exists at D:/git/.github/workflows/cli-starter-ci.yml and is scoped to CLI/** plus the workflow file itself.",
        "Decision D11 paused git usage until a follow-up direction decision recorded the repository boundary, delivery path, and whether git workflows should resume."
      ],
      "decision": [
        "Treat D:/git as the active repository and automation boundary for this workspace, while treating D:/git/CLI as the maintained CLI starter delivery scope inside that boundary.",
        "Keep near-term delivery local-first: make changes inside D:/git/CLI, validate management docs locally, and treat the root GitHub Actions workflow as the future hosted verification path rather than an immediate action item.",
        "Keep git workflows paused for now; commits, pushes, pull requests, or repository-boundary changes require a later accepted decision that explicitly resumes them."
      ],
      "rationale": [
        "This records the current workspace reality without forcing immediate repository surgery or remote-workflow churn.",
        "Separating the active repository boundary from the maintained starter scope removes ambiguity for future operators.",
        "Keeping git paused avoids reopening repository-history work before there is an explicit request to do so."
      ],
      "impact": [
        "AGENTS.md, agent-policy.yaml, plan.yaml, handoff.yaml, and verification.yaml should describe git as paused by the current accepted direction instead of paused because direction is missing.",
        "Near-term work stays limited to local cleanup, local validation, and management-document updates inside D:/git/CLI.",
        "Any future move to resume git workflows or split D:/git/CLI into a separate repository needs another accepted decision."
      ],
      "alternatives_considered": [
        {
          "option": "Resume git workflows immediately under the D:/git parent repository boundary",
          "reason_not_selected": "It would restart repository-history and remote-workflow churn without a new operator request."
        },
        {
          "option": "Extract D:/git/CLI into its own repository now",
          "reason_not_selected": "It would change repository ownership and delivery mechanics before the local-first direction has been carried through."
        }
      ]
    },
    {
      "id": "D13",
      "title": "Treat D:/git/CLI as the standalone delivery repository for the custom-cli remote",
      "status": "accepted",
      "date": "2026-04-18",
      "context": [
        "An explicit operator request asked to connect the CLI starter at D:/git/CLI to https://github.com/k4nul/custom-cli.git.",
        "The parent D:/git workspace is already an active Git repository with many unrelated sibling projects and a different origin remote, so attaching the new remote there would publish unrelated work.",
        "D:/git/CLI already contains a repo-local .github/workflows directory, which can host the starter verification workflow once the CLI starter becomes its own repository."
      ],
      "decision": [
        "Initialize D:/git/CLI as its own Git repository and scope future CLI starter git commands, history, and remotes to that directory.",
        "Connect the standalone D:/git/CLI repository to https://github.com/k4nul/custom-cli.git as origin.",
        "Restore hosted verification for the standalone repository under D:/git/CLI/.github/workflows/ci.yml."
      ],
      "rationale": [
        "This satisfies the explicit remote-connection request without exposing unrelated projects from the broader D:/git workspace.",
        "A standalone repository matches the starter's delivery scope more naturally than continuing to treat it as a git-paused subdirectory.",
        "Keeping the workflow inside the standalone repository preserves the existing README verification promise after the boundary change."
      ],
      "impact": [
        "AGENTS.md, agent-policy.yaml, plan.yaml, handoff.yaml, and verification.yaml should describe D:/git/CLI as the delivery repository and scope git usage there.",
        "Operators should run git status, commits, pushes, pulls, and remote management from D:/git/CLI rather than D:/git.",
        "The parent D:/git repository remains untouched for unrelated sibling projects."
      ],
      "alternatives_considered": [
        {
          "option": "Add the custom-cli remote to the parent D:/git repository",
          "reason_not_selected": "It would couple the new remote to many unrelated sibling directories and the existing Stegascope origin."
        },
        {
          "option": "Keep git paused and defer the remote hookup",
          "reason_not_selected": "It would ignore an explicit operator request to connect the starter to the newly created remote."
        },
        {
          "option": "Create a standalone D:/git/CLI repository without a repo-local workflow",
          "reason_not_selected": "It would leave the standalone repository without the hosted verification path already described in README.md."
        }
      ]
    },
    {
      "id": "D14",
      "title": "Prefer Linux-only local verification over repo-local GitHub Actions",
      "status": "accepted",
      "date": "2026-04-26",
      "context": [
        "The current Linux workspace now has a working local toolchain path with g++ 11.4.0, GNU Make, and CMake 4.3.2 installed under /home/k4nul/.local/bin, and local configure/build/ctest already succeeded.",
        "An explicit operator request asked to remove GitHub Actions and make the starter Linux-only.",
        "Recent hosted runs never reached repository steps because the repository owner's GitHub Actions billing or spending limits blocked job startup."
      ],
      "decision": [
        "Remove the repo-local GitHub Actions workflow under D:/git/CLI/.github/workflows/ci.yml.",
        "Remove the GitHub-hosted status inspection helper script that only supported the deleted workflow path.",
        "Treat Linux local validation as the supported verification baseline: run python3 tests/validate_management_docs.py, configure/build with CMake locally, and run ctest locally.",
        "Drop Windows and hosted CI verification from the starter contract unless a later accepted decision explicitly restores them."
      ],
      "rationale": [
        "The operator explicitly requested Linux-only validation rather than continuing to carry hosted CI complexity and billing dependencies.",
        "The local toolchain now covers the repository's current verification needs without waiting on external account state."
      ],
      "impact": [
        "README.md, plan.yaml, and handoff.yaml should describe Linux-only local verification instead of hosted or cross-platform CI.",
        "The repository no longer advertises repo-local GitHub Actions or GitHub-hosted status inspection.",
        "Future operators must record a new accepted decision before reintroducing Windows verification or hosted automation."
      ],
      "alternatives_considered": [
        {
          "option": "Keep the current GitHub Actions workflow and wait for billing recovery",
          "reason_not_selected": "It would preserve an external blocker after the operator explicitly requested Linux-only local verification."
        },
        {
          "option": "Switch immediately to self-hosted GitHub Actions runners",
          "reason_not_selected": "It would still keep GitHub-specific automation in scope when the request was to remove GitHub Actions entirely."
        },
        {
          "option": "Keep Windows verification while removing only the hosted Linux job",
          "reason_not_selected": "It would retain cross-platform claims that the operator asked to narrow to Linux-only."
        }
      ]
    }
  ]
}
